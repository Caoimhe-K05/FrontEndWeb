<ion-card *ngFor="let movie of myMovies"><!-- importing my movie posters and formatting them-->
  <img src={{movie.Poster}} /><!--poster-->
  <ion-card-header>
    <ion-card-title>{{movie.Title}}</ion-card-title><!--movie title-->
    <ion-card-subtitle>{{movie.Year}}</ion-card-subtitle><!--year-->
  </ion-card-header>
</ion-card>
</ion-content>
